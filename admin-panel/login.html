<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huglu Admin - Giriş</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f172a;background:linear-gradient(135deg,#0f172a,#1f2937)}
        .login-card{width:100%;max-width:420px;background:#fff;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.15);padding:28px}
        .login-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
        .login-header img{width:36px;height:36px;border-radius:8px;object-fit:cover}
        .login-header h1{font-size:20px;margin:0}
        .login-sub{color:#6b7280;margin:0 0 18px 0;font-size:13px}
        .form-group{display:flex;flex-direction:column;margin-bottom:12px}
        .form-group label{font-weight:600;margin-bottom:6px}
        .form-group input{padding:12px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px}
        .btn{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:12px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:600}
        .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .helper{display:flex;justify-content:space-between;align-items:center;margin:8px 0 0 0}
        .helper a{color:#667eea;text-decoration:none;font-size:13px}
        .error{display:none;margin:8px 0 0 0;color:#dc2626;font-weight:600;font-size:13px}
        .env-tip{margin-top:14px;color:#6b7280;font-size:12px}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <img src="../assets/logo.jpg" alt="Logo">
            <h1>Huglu Admin</h1>
        </div>
        <p class="login-sub">Yönetim paneline erişmek için giriş yapın.</p>

        <div class="form-group">
            <label for="apiBase">API Sunucusu</label>
            <input id="apiBase" type="text" placeholder="http://213.142.159.135:3000/api" value="http://213.142.159.135:3000/api">
        </div>
        <div class="form-group">
            <label for="username">Kullanıcı Adı</label>
            <input id="username" type="text" placeholder="kullanıcı adı" value="">
        </div>
        <div class="form-group">
            <label for="password">Şifre</label>
            <input id="password" type="password" placeholder="şifre" value="">
        </div>
        <button class="btn btn-primary" id="loginBtn"><i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Giriş Yap</button>
        <div id="loginError" class="error">Giriş başarısız. Lütfen bilgileri kontrol edin.</div>
        <div class="helper">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="remember"> Beni hatırla</label>
            <a href="#" onclick="alert('Lütfen sistem yöneticinizle iletişime geçin.')">Yardım</a>
        </div>
        <div class="env-tip">İpucu: Varsayılan anahtar backend env: ADMIN_KEY ile doğrulanır.</div>
    </div>

    <script>
    (function(){
        const $ = sel => document.querySelector(sel);
        const apiBaseInput = $('#apiBase');
        const usernameInput = $('#username');
        const passwordInput = $('#password');
        const remember = $('#remember');
        const errorBox = $('#loginError');

        try {
            const savedBase = localStorage.getItem('API_BASE_OVERRIDE');
            if (savedBase) apiBaseInput.value = savedBase;
        } catch(_) {}

        document.getElementById('loginBtn').addEventListener('click', async function(){
            errorBox.style.display = 'none';
            const base = apiBaseInput.value.trim();
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!base || !username || !password) {
                errorBox.textContent = 'Lütfen API, kullanıcı adı ve şifreyi girin.';
                errorBox.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(base + '/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                if (!res.ok) throw new Error('Giriş başarısız');
                const data = await res.json();
                if (data && data.success && data.token) {
                    try {
                        localStorage.setItem('ADMIN_TOKEN', data.token);
                        if (remember.checked) localStorage.setItem('API_BASE_OVERRIDE', base);
                    } catch (_) {}
                    window.location.href = 'index.html';
                } else {
                    throw new Error('Geçersiz yanıt');
                }
            } catch (e) {
                errorBox.textContent = 'Giriş başarısız. Sunucuya ulaşılamadı veya anahtar hatalı.';
                errorBox.style.display = 'block';
            }
        });
    })();
    </script>
</body>
</html>
